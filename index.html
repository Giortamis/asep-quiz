<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b5cab">
  <title>ΑΣΕΠ Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <header class="header">
    <h1>Προσομοιωτής Γραπτού ΑΣΕΠ</h1>
    <p>Δοκιμαστική οργανωμένη έκδοση</p>
  </header>

  <section id="home" class="card">
    <h2>Αρχικό μενού</h2>
    <div class="menu">
      <button onclick="openStudy()">📚 Διάβασμα</button>
      <button onclick="openTest()">🎯 Τεστ</button>
      <button onclick="showMessage('Τα στατιστικά θα προστεθούν σε επόμενη έκδοση.')">📊 Στατιστικά</button>
      <button onclick="showMessage('Τα λάθη μου θα ενεργοποιηθούν όταν προστεθεί η αποθήκευση αποτελεσμάτων.')">❌ Τα λάθη μου</button>
      <button onclick="showMessage('Οι αγαπημένες θα προστεθούν σε επόμενη έκδοση.')">⭐ Αγαπημένες</button>
    </div>
  </section>

  <section id="testSetup" class="card hidden">
    <h2>Ρύθμιση ενοτήτων διαγωνισμού</h2>
    <p>Επίλεξε τις ενότητες που θα χρησιμοποιούνται στα τεστ. Η επιλογή αποθηκεύεται στη συσκευή.</p>
    <label class="check all-check"><input type="checkbox" id="allCategories"> <strong>All — Όλες οι ενότητες</strong></label>
    <div id="categoryChecks" class="checks"></div>
    <div class="actions">
      <button class="secondary" onclick="goHome()">Πίσω</button>
      <button class="primary" onclick="saveTestCategories()">Αποθήκευση επιλογών</button>
    </div>
  </section>

  <section id="testHome" class="card hidden">
    <h2>Τεστ</h2>
    <p id="activeSummary"></p>

    <label for="testCount">Αριθμός ερωτήσεων</label>
    <input id="testCount" type="number" min="1" max="100" value="25">

    <div class="actions">
      <button class="secondary" onclick="goHome()">Πίσω</button>
      <button class="primary" onclick="startTest()">Έναρξη</button>
    </div>

    <button class="reset" onclick="resetTestCategories()">Reset ενοτήτων</button>
  </section>

  <section id="studySetup" class="card hidden">
    <h2>Διάβασμα</h2>
    <label for="studyCategory">Ενότητα</label>
    <select id="studyCategory"></select>

    <label for="studySeconds">Σε πόσα δευτερόλεπτα θέλεις να εμφανίζεται η σωστή απάντηση;</label>
    <input id="studySeconds" type="number" min="1" max="300" value="5">

    <label class="check"><input type="checkbox" id="randomStudy" checked> Τυχαία σειρά</label>
    <label class="check"><input type="checkbox" id="autoNextStudy"> Αυτόματη μετάβαση μετά την εμφάνιση της απάντησης</label>

    <div class="actions">
      <button class="secondary" onclick="goHome()">Πίσω</button>
      <button class="primary" onclick="startStudy()">Έναρξη</button>
    </div>
  </section>

  <section id="quizScreen" class="hidden">
    <div class="topbar">
      <span id="quizCounter"></span>
      <span id="quizModeLabel"></span>
    </div>
    <div class="progress"><div id="progressBar"></div></div>

    <section class="card">
      <div id="quizCategory" class="badge"></div>
      <h2 id="questionText" class="question"></h2>
      <div id="answers" class="answers"></div>
      <div id="feedback" class="feedback"></div>
      <div class="actions">
        <button id="revealButton" class="secondary hidden" onclick="revealStudyAnswer()">Εμφάνιση τώρα</button>
        <button id="nextButton" class="primary hidden" onclick="nextQuestion()">Επόμενη</button>
      </div>
    </section>

    <button class="secondary full" onclick="finishEarly()">Τέλος</button>
  </section>

  <section id="resultScreen" class="card hidden">
    <h2>Αποτέλεσμα</h2>
    <div id="resultScore" class="score"></div>
    <p id="resultDetails"></p>
    <button class="primary full" onclick="goHome()">Επιστροφή στο αρχικό μενού</button>
  </section>

  <div id="message" class="message hidden"></div>
  <footer>Πηγή δεδομένων: Επίσημο Μητρώο Θεμάτων Γνώσεων ΑΣΕΠ</footer>
</main>
<script src="app.js"></script>
</body>
</html>
